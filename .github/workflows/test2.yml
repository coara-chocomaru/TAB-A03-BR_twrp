name: Recovery Build (Legacy)

on:
  push:
    branches:
      - main
env:
  MANIFEST_URL: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni'
  MANIFEST_BRANCH: 'twrp-5.1'
  DEVICE_TREE_URL: 'https://github.com/coara-chocomaru/a03-br'
  DEVICE_TREE_BRANCH: 'main'
  DEVICE_PATH: 'device/sts/a03br'
  DEVICE_NAME: 'a03br'
  MAKEFILE_NAME: 'omni_a03br'
  BUILD_TARGET: 'recovery'
jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Display Run Parameters
      run: |
        echo "::group::User Environment Variables"
        echo "Manifest URL: ${{ env.MANIFEST_URL }}"
        echo "Manifest Branch: ${{ env.MANIFEST_BRANCH }}"
        echo "Device Tree URL: ${{ env.DEVICE_TREE_URL }}"
        echo "Device Tree Branch: ${{ env.DEVICE_TREE_BRANCH }}"
        echo "Device Path: ${{ env.DEVICE_PATH }}"
        echo "Device Name: ${{ env.DEVICE_NAME }}"
        echo "Makefile Name: ${{ env.MAKEFILE_NAME }}"
        echo "Build Target: ${{ env.BUILD_TARGET }}.img"
        echo "::endgroup::"

    - name: Check Out
      uses: actions/checkout@v3

    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Prepare the environment
      run: |
        sudo apt update
        sudo apt -y upgrade
        sudo apt -y install gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib libc6-dev \
          lib32ncurses5-dev x11proto-core-dev libx11-dev tree lib32z-dev libgl1-mesa-dev libxml2-utils \
          xsltproc bc ccache lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev \
          libwxgtk3.0-gtk3-dev libxml2 lzop pngcrush schedtool squashfs-tools imagemagick \
          libbz2-dev lzma ncftp qemu-user-static libstdc++-10-dev libncurses5 python3

    - name: Install OpenJDK
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '8'

    - name: Setup SSH Keys
      if: ${{ startsWith(env.MANIFEST_URL, 'git@github.com') }}
      uses: webfactory/ssh-agent@v0.5.4
      with:
          ssh-private-key: |
              ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Install repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize repo
      run: |
        mkdir workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
        git config --global user.name "azwhikaru"
        git config --global user.email "azwhikaru+37921907@github.com"
        repo init --depth=1 -u ${{ env.MANIFEST_URL }} -b ${{ env.MANIFEST_BRANCH }}
      id: pwd

    - name: Repo Sync
      run: |
        repo sync -j$(nproc --all) --force-sync
      working-directory: workspace

    - name: Verify repo sync completeness
      run: |
        MISSING=0
        for p in external/sgdisk external/exfat external/fsck_msdos external/fuse bootable/recovery system/vold; do
          if [ ! -d "$p" ] || [ -z "$(ls -A "$p" 2>/dev/null)" ]; then
            echo "MISSING PROJECT: $p"
            MISSING=1
          else
            echo "OK PROJECT: $p"
          fi
        done
        if [ "$MISSING" -eq 1 ]; then
          echo "::warning::repo sync で一部プロジェクトが空、または未取得です。manifest.xml と local_manifests を確認してください。"
        fi
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Move files to workspace
      run: |
        mkdir -p workspace/${{ env.DEVICE_PATH }}
        ls | grep -v workspace | xargs -I{} mv {} workspace/${{ env.DEVICE_PATH }}

    - name: Show current BoardConfig exclusion flags
      run: |
        cd ${{ env.DEVICE_PATH }}
        echo "::group::Current TW_ / exclusion related flags"
        grep -E '^(TW_|BOARD_HAS_NO)' BoardConfig.mk || true
        echo "::endgroup::"
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Patch BoardConfig with the correct exclusion flags
      run: |
        cd ${{ env.DEVICE_PATH }}
        if grep -q '^BOARD_HAS_NO_REAL_SDCARD' BoardConfig.mk; then
          sed -i 's/^BOARD_HAS_NO_REAL_SDCARD.*/BOARD_HAS_NO_REAL_SDCARD := true/' BoardConfig.mk
        else
          echo 'BOARD_HAS_NO_REAL_SDCARD := true' >> BoardConfig.mk
        fi
        if grep -q '^TW_NO_EXFAT ' BoardConfig.mk || grep -q '^TW_NO_EXFAT:' BoardConfig.mk; then
          sed -i 's/^TW_NO_EXFAT .*/TW_NO_EXFAT := true/' BoardConfig.mk
        else
          echo 'TW_NO_EXFAT := true' >> BoardConfig.mk
        fi
        echo "::group::Patched flags"
        grep -E '^(BOARD_HAS_NO_REAL_SDCARD|TW_NO_EXFAT|TW_NO_EXFAT_FUSE|TW_EXCLUDE_TWRPAPP)' BoardConfig.mk
        echo "::endgroup::"
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Locate TWRPApp addition point (recursive search)
      run: |
        echo "::group::Recursive search for TWRPApp / twrpapp / privapp-permissions-twrpapp"
        grep -rln "TWRPApp\|twrpapp" --include="*.mk" . 2>/dev/null | grep -v "^\./out/" || echo "no .mk match anywhere in tree"
        echo "::endgroup::"

        echo "::group::PRODUCT_PACKAGES containing twrpapp (any file type)"
        grep -rln "PRODUCT_PACKAGES" --include="*.mk" bootable/recovery vendor/omni device 2>/dev/null | xargs grep -l "twrpapp" 2>/dev/null || echo "not found via PRODUCT_PACKAGES scan"
        echo "::endgroup::"
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Diagnose actual bootable/recovery source for these binaries
      run: |
        echo "::group::bootable/recovery remote and revision info"
        git -C bootable/recovery remote -v 2>/dev/null || echo "bootable/recovery is not a git repo or missing"
        git -C bootable/recovery log -1 2>/dev/null || true
        echo "::endgroup::"

        echo "::group::twrp-extras.xml presence in manifest"
        find .repo -iname "twrp-extras.xml" 2>/dev/null || echo "twrp-extras.xml not found in synced manifest"
        echo "::endgroup::"

        echo "::group::fsck.fat / mkfs.fat reference in Android.mk"
        grep -n "fsck.fat\|mkfs.fat\|fatlabel" bootable/recovery/Android.mk 2>/dev/null || echo "Android.mk not found or no match"
        echo "::endgroup::"

        echo "::group::TW_EXCLUDE_TWRPAPP reference in Android.mk"
        grep -n "TW_EXCLUDE_TWRPAPP" bootable/recovery/Android.mk 2>/dev/null || echo "no match"
        echo "::endgroup::"

        echo "::group::TWRPApp package reference (product makefiles)"
        grep -rn "TWRPApp\|twrpapp" bootable/recovery/*.mk vendor/omni/config/*.mk 2>/dev/null || echo "no match"
        echo "::endgroup::"

        echo "::group::TW_NO_EXFAT_FUSE / TW_INCLUDE_CRYPTO reference in Android.mk"
        grep -n "TW_NO_EXFAT_FUSE\|TW_INCLUDE_CRYPTO" bootable/recovery/Android.mk 2>/dev/null || echo "no match"
        echo "::endgroup::"

        echo "::group::sgdisk reference (source location and Android.mk gating)"
        find external -maxdepth 1 -iname "sgdisk*" 2>/dev/null || echo "external/sgdisk not present in synced source"
        grep -rn "sgdisk" bootable/recovery/*.mk 2>/dev/null || echo "no sgdisk reference in recovery product makefiles"
        echo "::endgroup::"

        echo "::group::libcrypto.so consumers (reverse dependency check)"
        grep -rln "libcrypto" bootable/recovery/*/Android.mk 2>/dev/null || echo "no direct libcrypto references found under bootable/recovery"
        echo "::endgroup::"
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Patch Android.mk to drop unconditional FAT tools (fsck.fat/fatlabel/mkfs.fat)
      run: |
        cd bootable/recovery
        cp Android.mk Android.mk.bak
        sed -i '/^\s*fsck\.fat \\$/d; /^\s*fatlabel \\$/d; /^\s*mkfs\.fat \\$/d' Android.mk
        echo "::group::Diff after patch"
        diff -u Android.mk.bak Android.mk || true
        echo "::endgroup::"
        rm -f Android.mk.bak
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Diagnose available static crypto library module name
      run: |
        echo "::group::Search for libcrypto_static module definition"
        grep -rn "libcrypto_static" external/boringssl/*.bp external/boringssl/*.mk external/openssl/*.bp external/openssl/*.mk 2>/dev/null || echo "not found under external/boringssl or external/openssl (may not be synced, or named differently)"
        echo "::endgroup::"

        echo "::group::List crypto-related library projects actually synced"
        find external -maxdepth 1 -iname "*ssl*" -o -maxdepth 1 -iname "*crypto*" 2>/dev/null
        echo "::endgroup::"
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Statically link libcrypto to eliminate standalone libcrypto.so
      run: |
        python3 - <<'PYEOF'
        import re, glob

        word = re.compile(r'(?<![\w.])libcrypto(?![\w.])')
        patched = []
        for path in glob.glob('bootable/recovery/**/Android.mk', recursive=True):
            with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                content = f.read()
            lines = content.split('\n')
            changed = False
            out_lines = []
            for line in lines:
                if 'LOCAL_SHARED_LIBRARIES' in line and word.search(line):
                    new_line = word.sub('', line)
                    new_line = re.sub(r'[ \t]+', ' ', new_line).rstrip()
                    out_lines.append(new_line)
                    out_lines.append('LOCAL_STATIC_LIBRARIES += libcrypto_static')
                    changed = True
                else:
                    out_lines.append(line)
            if changed:
                with open(path, 'w', encoding='utf-8') as f:
                    f.write('\n'.join(out_lines))
                patched.append(path)

        print("::group::Patched files (libcrypto shared -> libcrypto_static static)")
        for p in patched:
            print(p)
        if not patched:
            print("no files patched (libcrypto not referenced in any LOCAL_SHARED_LIBRARIES line)")
        print("::endgroup::")
        PYEOF
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone common tree
      if: |
        env.COMMON_TREE_URL != null
        && env.COMMON_PATH != null
      run: |
        git clone ${{ env.COMMON_TREE_URL }} -b ${{ env.DEVICE_TREE_BRANCH }} ./${{ env.COMMON_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Switch to Python2
      run: |
        sudo apt -y install python2
        sudo update-alternatives --install /usr/bin/python python /usr/bin/python2 1
      continue-on-error: true

    - name: Remove unused language files
      run: |
             cd workspace
             find bootable/recovery/gui/theme/common/languages/ \
             -name "*.xml" ! -name "ja.xml" ! -name "en.xml" -delete

    - name: Fix GCC10+ fno-common host build failure
      run: |
        echo 'HOST_GLOBAL_CFLAGS += -fcommon' >> build/core/combo/HOST_linux-x86.mk
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Patch checkpolicy.h to fix GCC10+ multiple definition error
      run: |
        sed -i 's/^te_assert_t \*te_assertions;/extern te_assert_t *te_assertions;/' external/checkpolicy/checkpolicy.h
        echo 'te_assert_t *te_assertions;' >> external/checkpolicy/checkpolicy.c
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Fix missing C++11 standard for target recovery build
      run: |
        echo 'TARGET_GLOBAL_CPPFLAGS += -std=gnu++11' >> build/core/combo/TARGET_linux-arm64.mk
        echo 'TARGET_GLOBAL_CPPFLAGS += -std=gnu++11' >> build/core/combo/TARGET_linux-arm.mk
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Building recovery
      run: |
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch ${{ env.MAKEFILE_NAME }}-eng && make clean && make ${{ env.BUILD_TARGET }}image -j$(nproc --all)
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Verify recovery ramdisk contents (should be ABSENT if exclusion worked)
      run: |
        RAMDISK_ROOT="workspace/out/target/product/${{ env.DEVICE_NAME }}/recovery/root"
        echo "Checking $RAMDISK_ROOT"
        for f in sbin/fsck.exfat sbin/fsck.fat sbin/sgdisk sbin/libcrypto.so; do
          if [ -e "$RAMDISK_ROOT/$f" ]; then
            echo "::warning::STILL PRESENT (除外できていません): $f"
          else
            echo "OK REMOVED: $f"
          fi
        done
        echo "::group::twrpapp related files (should be empty if excluded)"
        find "$RAMDISK_ROOT" -iname "*twrpapp*" 2>/dev/null
        echo "::endgroup::"

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: | 
          workspace/out/target/product/${{ env.DEVICE_NAME }}/${{ env.BUILD_TARGET }}.img
          workspace/out/target/product/${{ env.DEVICE_NAME }}/*.zip
          workspace/out/target/product/${{ env.DEVICE_NAME }}/*vendor*.img
        name: ${{ env.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          Manifest: ${{ env.MANIFEST_BRANCH }}
          Device: ${{ env.DEVICE_NAME }}
          Target: ${{ env.BUILD_TARGET }}.img
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
