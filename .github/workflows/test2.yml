name: Recovery Build (Legacy)

on:
  push:
    branches:
      - mainf

env:
  MANIFEST_URL: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni'
  MANIFEST_BRANCH: 'twrp-5.1'
  DEVICE_TREE_URL: 'https://github.com/coara-chocomaru/a03-br'
  DEVICE_TREE_BRANCH: 'main'
  DEVICE_PATH: 'device/sts/a03br'
  DEVICE_NAME: 'a03br'
  MAKEFILE_NAME: 'omni_a03br'
  BUILD_TARGET: 'recovery'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    container:
      image: ubuntu:14.04
    permissions:
      contents: write

    steps:
      - name: Display Run Parameters
        shell: bash
        run: |
          echo "::group::User Environment Variables"
          echo "Manifest URL: ${{ env.MANIFEST_URL }}"
          echo "Manifest Branch: ${{ env.MANIFEST_BRANCH }}"
          echo "Device Tree URL: ${{ env.DEVICE_TREE_URL }}"
          echo "Device Tree Branch: ${{ env.DEVICE_TREE_BRANCH }}"
          echo "Device Path: ${{ env.DEVICE_PATH }}"
          echo "Device Name: ${{ env.DEVICE_NAME }}"
          echo "Makefile Name: ${{ env.MAKEFILE_NAME }}"
          echo "Build Target: ${{ env.BUILD_TARGET }}.img"
          echo "::endgroup::"

      - name: Prepare the environment
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: UTC
        shell: bash
        run: |
          set -euxo pipefail

          rm -f /etc/apt/sources.list.d/*.list || true
          rm -f /etc/apt/sources.list.d/ubuntu-esm-infra-trusty.list || true

          cat >/etc/apt/sources.list <<'EOF'
          deb http://archive.ubuntu.com/ubuntu trusty main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu trusty-updates main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu trusty-backports main restricted universe multiverse
          deb http://security.ubuntu.com/ubuntu trusty-security main restricted universe multiverse
          EOF

          echo "tzdata tzdata/Areas select Etc" | debconf-set-selections
          echo "tzdata tzdata/Zones/Etc select UTC" | debconf-set-selections

          apt-get -o Acquire::Check-Valid-Until=false update

          apt-get install -y --no-install-recommends \
            gperf gcc-multilib g++-multilib \
            libc6-dev lib32ncurses5-dev x11proto-core-dev libx11-dev tree \
            lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc bc ccache \
            lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev \
            libsdl1.2-dev \
            libwxbase3.0-0 libwxbase3.0-dev \
            libwxgtk3.0-0 libwxgtk3.0-dev \
            wx3.0-headers wx-common \
            libxml2 lzop pngcrush schedtool squashfs-tools imagemagick \
            libbz2-dev lzma ncftp qemu-user-static libncurses5 \
            python git curl python2.7 debconf-utils openjdk-7-jdk \
            libbcprov-java \
            make m4 bison flex libssl-dev libtool autoconf automake gawk \
            ca-certificates

          update-alternatives --install /usr/bin/python python /usr/bin/python2.7 1 || true
          update-alternatives --install /usr/bin/python2 python2 /usr/bin/python2.7 1 || true
          echo "JAVA_HOME=/usr/lib/jvm/java-7-openjdk-amd64" >> "$GITHUB_ENV"
          echo "USE_CCACHE=1" >> "$GITHUB_ENV"
          echo "JAVA_TOOL_OPTIONS=-Xbootclasspath/a:/usr/share/java/bcprov.jar" >> "$GITHUB_ENV"

          apt-get clean
          rm -rf /var/lib/apt/lists/*
          rm -rf /var/cache/apt/archives/*.deb

      - name: Clone repository
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --depth=1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .

      - name: Install repo
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ~/bin
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo-1 -o ~/bin/repo
          chmod a+x ~/bin/repo
          ln -sf ~/bin/repo /usr/bin/repo

      - name: Initialize repo
        shell: bash
        id: pwd
        run: |
          set -euxo pipefail
          mkdir -p workspace
          cd workspace
          echo "workspace-folder=$(pwd)" >> "$GITHUB_OUTPUT"
          git config --global user.name "azwhikaru"
          git config --global user.email "azwhikaru+37921907@github.com"
          repo init --depth=1 --repo-branch=repo-1 -u "${{ env.MANIFEST_URL }}" -b "${{ env.MANIFEST_BRANCH }}"

      - name: Repo Sync
        shell: bash
        working-directory: workspace
        run: |
          set -euxo pipefail
          repo sync -j"$(nproc --all)" --force-sync --no-clone-bundle --no-tags --prune

      - name: Move files to workspace
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "workspace/${{ env.DEVICE_PATH }}"
          find . -maxdepth 1 -mindepth 1 \
            ! -name workspace \
            ! -name .git \
            -exec mv -t "workspace/${{ env.DEVICE_PATH }}" -- {} +

      - name: Patch legacy nullptr build error
        shell: bash
        working-directory: ${{ steps.pwd.outputs.workspace-folder }}
        run: |
          set -euxo pipefail
          sed -i 's/nullptr/NULL/g' bootable/recovery/partition.cpp

      - name: Patch recovery ramdisk symbol stripping
        shell: bash
        working-directory: ${{ steps.pwd.outputs.workspace-folder }}
        run: |
          set -euxo pipefail
          printf '\t$(hide) find $(TARGET_RECOVERY_ROOT_OUT) -type f \\( -path "*/sbin/*" -o -name "*.so" \\) -exec $(TARGET_STRIP) --strip-unneeded {} \\; >/dev/null 2>&1 ; find $(TARGET_RECOVERY_ROOT_OUT) -type f \\( -path "*/sbin/*" -o -name "*.so" \\) -exec $(TARGET_2ND_STRIP) --strip-unneeded {} \\; >/dev/null 2>&1 ; true\n' > /tmp/strip_recovery_ramdisk.mk
          sed -i '\#ro.adb.secure=1/ro.adb.secure=0#r /tmp/strip_recovery_ramdisk.mk' build/core/Makefile
          grep -n -A1 "ro.adb.secure=1/ro.adb.secure=0" build/core/Makefile

          sed -i 's#\$(MINIGZIP) < \$(recovery_uncompressed_ramdisk) > \$@#$(MINIGZIP) -9 < $(recovery_uncompressed_ramdisk) > $@#' build/core/Makefile
          grep -n "MINIGZIP.*recovery_uncompressed_ramdisk" build/core/Makefile

      - name: Append size-optimized build flags to BoardConfig.mk
        shell: bash
        working-directory: ${{ steps.pwd.outputs.workspace-folder }}
        run: |
          set -euxo pipefail
          cat >> "${{ env.DEVICE_PATH }}/BoardConfig.mk" <<'EOF'

          TW_EXCLUDE_LZMA := true

          TARGET_GLOBAL_CFLAGS += -Os -ffunction-sections -fdata-sections
          TARGET_GLOBAL_CPPFLAGS += -Os -ffunction-sections -fdata-sections
          TARGET_GLOBAL_LDFLAGS += -Wl,--gc-sections

          TARGET_2ND_GLOBAL_CFLAGS += -Os -ffunction-sections -fdata-sections
          TARGET_2ND_GLOBAL_CPPFLAGS += -Os -ffunction-sections -fdata-sections
          TARGET_2ND_GLOBAL_LDFLAGS += -Wl,--gc-sections
          EOF
          tail -n 15 "${{ env.DEVICE_PATH }}/BoardConfig.mk"

      - name: Building recovery
        shell: bash
        working-directory: ${{ steps.pwd.outputs.workspace-folder }}
        run: |
          set -euxo pipefail
          set +u
          source build/envsetup.sh
          lunch "${{ env.MAKEFILE_NAME }}-eng"
          set -u
          export ALLOW_MISSING_DEPENDENCIES=true
          make "${{ env.BUILD_TARGET }}image" -j2

      - name: Reduce build output disk usage
        shell: bash
        working-directory: ${{ steps.pwd.outputs.workspace-folder }}
        run: |
          set -euxo pipefail
          OUT_DIR="out/target/product/${{ env.DEVICE_NAME }}"
          rm -rf "${OUT_DIR}/symbols"
          rm -rf "${OUT_DIR}/obj"
          rm -rf "${OUT_DIR}/gen"
          rm -rf "${OUT_DIR}/installed-files.json"
          rm -rf "${OUT_DIR}/installed-files.txt"
          find "${OUT_DIR}" -name "*.d" -delete
          find "${OUT_DIR}" -name "*.o" -delete
          rm -rf out/host/linux-x86/obj
          rm -rf out/host/linux-x86/symbols
          ccache -C || true
          df -h .

      - name: Upload to Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import glob
          import json
          import os
          import pathlib
          import urllib.error
          import urllib.parse
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          run_id = os.environ["GITHUB_RUN_ID"]
          device = os.environ["DEVICE_NAME"]
          target = os.environ["BUILD_TARGET"]
          body = f"Manifest: {os.environ['MANIFEST_BRANCH']}\nDevice: {device}\nTarget: {target}.img\n"

          patterns = [
              f"workspace/out/target/product/{device}/{target}.img",
              f"workspace/out/target/product/{device}/*.zip",
              f"workspace/out/target/product/{device}/*vendor*.img",
          ]
          assets = []
          for pattern in patterns:
              assets.extend(sorted(glob.glob(pattern)))
          assets = [p for p in assets if pathlib.Path(p).is_file()]
          if not assets:
              raise SystemExit("No release assets found")

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "python",
          }

          def request(url, method="GET", data=None, extra_headers=None):
              hdrs = dict(headers)
              if extra_headers:
                  hdrs.update(extra_headers)
              req = urllib.request.Request(url, data=data, headers=hdrs, method=method)
              return urllib.request.urlopen(req)

          release_api = f"https://api.github.com/repos/{repo}/releases"
          payload = json.dumps({
              "tag_name": run_id,
              "name": f"{device}-{run_id}",
              "body": body,
              "draft": False,
              "prerelease": False,
          }).encode("utf-8")

          try:
              with request(release_api, method="POST", data=payload, extra_headers={"Content-Type": "application/json"}) as resp:
                  release = json.load(resp)
          except urllib.error.HTTPError as e:
              if e.code == 422:
                  with request(f"{release_api}/tags/{run_id}") as resp:
                      release = json.load(resp)
              else:
                  raise

          upload_url = release["upload_url"].split("{", 1)[0]
          for asset in assets:
              name = os.path.basename(asset)
              url = f"{upload_url}?{urllib.parse.urlencode({'name': name})}"
              with open(asset, "rb") as f:
                  data = f.read()
              with request(url, method="POST", data=data, extra_headers={
                  "Content-Type": "application/octet-stream",
                  "Content-Length": str(len(data)),
              }) as resp:
                  print(f"uploaded {name}: {resp.status}")
          print("release complete")
          PY
