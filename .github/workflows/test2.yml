name: Recovery Build (Legacy)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  MANIFEST_URL: "https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni"
  MANIFEST_BRANCH: "twrp-5.1"
  DEVICE_TREE_BRANCH: "main"
  DEVICE_PATH: "device/sts/a03br"
  DEVICE_NAME: "a03br"
  MAKEFILE_NAME: "omni_a03br"
  BUILD_TARGET: "recovery"
  ANDROID_ROOT: "/work/src"

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest

    container:
      image: ubuntu:20.04
      options: --user root
      env:
        DEBIAN_FRONTEND: noninteractive

    permissions:
      contents: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build deps in container
        run: |
          apt-get update
          apt-get install -y \
            git curl ca-certificates rsync unzip zip \
            gperf gcc-multilib g++-multilib libc6-dev-i386 \
            lib32ncurses5-dev x11proto-core-dev libx11-dev \
            tree lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc bc \
            ccache lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev \
            libsdl1.2-dev libwxgtk3.0-gtk3-dev libxml2 lzop pngcrush \
            schedtool squashfs-tools imagemagick libbz2-dev lzma ncftp \
            qemu-user-static libstdc++-10-dev python2 openjdk-8-jdk \
            make build-essential
          ln -sf /usr/bin/python2 /usr/bin/python || true

      - name: Install repo
        run: |
          mkdir -p ~/bin
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o ~/bin/repo
          chmod a+x ~/bin/repo
          ln -sf ~/bin/repo /usr/local/bin/repo

      - name: Prepare Android root
        run: |
          mkdir -p "${ANDROID_ROOT}"
          mkdir -p /work/.ccache
          git config --global user.name "azwhikaru"
          git config --global user.email "azwhikaru+37921907@github.com"

      - name: Init repo
        working-directory: /work/src
        run: |
          repo init --depth=1 --no-repo-verify -u "${MANIFEST_URL}" -b "${MANIFEST_BRANCH}"

      - name: Sync repo
        working-directory: /work/src
        run: |
          repo sync -c --force-sync --no-clone-bundle --no-tags --prune -j"$(nproc --all)"

      - name: Move workflow repo into device tree
        run: |
          mkdir -p "/work/src/${DEVICE_PATH}"
          rsync -a --delete \
            --exclude=.git \
            --exclude=.github \
            "${GITHUB_WORKSPACE}/" "/work/src/${DEVICE_PATH}/"

      - name: Temporary exclusions for legacy TWRP
        working-directory: /work/src
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          targets = {
              "fsck.exfat",
              "fsck.fat",
              "libcrypto.so",
              "sgdisk",
              "me.twrp.twrpapp.apk",
          }

          mk_exts = {".mk", ".mak", ".product"}

          def is_target_line(line: str) -> bool:
              if line.lstrip().startswith("#"):
                  return False
              for t in targets:
                  if re.search(rf"\b{re.escape(t)}\b", line):
                      return True
              return False

          def mk_should_drop_stanza(stanza_lines):
              """
              Drop a whole Android.mk-style stanza only when the module name
              itself is one of the target names.
              """
              joined = "\n".join(stanza_lines)
              for t in targets:
                  if re.search(rf'^\s*LOCAL_MODULE\s*[:+]?=\s*{re.escape(t)}\s*$', joined, re.M):
                      return True
                  if re.search(rf'^\s*LOCAL_PACKAGE_NAME\s*[:+]?=\s*{re.escape(t)}\s*$', joined, re.M):
                      return True
              return False

          for p in Path(".").rglob("*"):
              if not p.is_file():
                  continue

              suffix = p.suffix.lower()
              if suffix not in mk_exts:
                  continue

              try:
                  text = p.read_text(encoding="utf-8", errors="ignore")
              except Exception:
                  continue

              lines = text.splitlines()
              new_lines = []
              changed = False

              if suffix in {".mk", ".mak"}:
                  stanza = []
                  in_stanza = False

                  def flush_stanza():
                      nonlocal stanza, new_lines, changed
                      if not stanza:
                          return
                      if mk_should_drop_stanza(stanza):
                          changed = True
                      else:
                          new_lines.extend(stanza)
                      stanza = []

                  for line in lines:
                      if line.strip() == "include $(CLEAR_VARS)":
                          flush_stanza()
                          in_stanza = True
                          stanza.append(line)
                          continue

                      if in_stanza:
                          stanza.append(line)
                          # End of most module stanzas
                          if line.strip().startswith("include $(") and "BUILD_" in line:
                              flush_stanza()
                              in_stanza = False
                          continue

                      # Outside a module stanza: only remove explicit package-list entries.
                      if is_target_line(line) and (
                          "PRODUCT_PACKAGES" in line
                          or "LOCAL_REQUIRED_MODULES" in line
                          or "PRODUCT_COPY_FILES" in line
                      ):
                          changed = True
                          continue

                      new_lines.append(line)

                  flush_stanza()

              else:
                  # .product: remove only explicit package references, preserve comments and other lines
                  for line in lines:
                      if is_target_line(line) and (
                          "PRODUCT_PACKAGES" in line
                          or "LOCAL_REQUIRED_MODULES" in line
                          or "PRODUCT_COPY_FILES" in line
                      ):
                          changed = True
                          continue
                      new_lines.append(line)

              if changed:
                  new_text = "\n".join(new_lines)
                  if text.endswith("\n"):
                      new_text += "\n"
                  p.write_text(new_text, encoding="utf-8")
          PY

      - name: Verify exclusions
        working-directory: /work/src
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          targets = {
              "fsck.exfat",
              "fsck.fat",
              "libcrypto.so",
              "sgdisk",
              "me.twrp.twrpapp.apk",
          }

          mk_exts = {".mk", ".mak", ".product"}
          bad = []

          def has_target(line: str) -> bool:
              if line.lstrip().startswith("#"):
                  return False
              return any(re.search(rf"\b{re.escape(t)}\b", line) for t in targets)

          for p in Path(".").rglob("*"):
              if not p.is_file() or p.suffix.lower() not in mk_exts:
                  continue
              try:
                  lines = p.read_text(encoding="utf-8", errors="ignore").splitlines()
              except Exception:
                  continue

              for i, line in enumerate(lines, 1):
                  if not has_target(line):
                      continue
                  # Allow harmless comments, but fail on active build directives
                  if (
                      "PRODUCT_PACKAGES" in line
                      or "LOCAL_MODULE" in line
                      or "LOCAL_PACKAGE_NAME" in line
                      or "LOCAL_REQUIRED_MODULES" in line
                      or "PRODUCT_COPY_FILES" in line
                  ):
                      bad.append(f"{p}:{i}:{line}")

          if bad:
              print("\n".join(bad))
              print("Unwanted active entries still remain.")
              sys.exit(1)
          PY

      - name: Sanity check envsetup
        working-directory: /work/src
        run: |
          if [ ! -f build/envsetup.sh ]; then
            echo "build/envsetup.sh is missing in Android root"
            exit 1
          fi

      - name: Build recovery
        working-directory: /work/src
        run: |
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          export USE_CCACHE=1
          export CCACHE_DIR=/work/.ccache
          export BUILD_BROKEN_DUP_RULES=true
          ccache -M 20G || true
          lunch "${MAKEFILE_NAME}-eng"
          make clean
          make "${BUILD_TARGET}image" -j"$(nproc --all)"

      - name: Upload release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            /work/src/out/target/product/${{ env.DEVICE_NAME }}/${{ env.BUILD_TARGET }}.img
            /work/src/out/target/product/${{ env.DEVICE_NAME }}/*.zip
            /work/src/out/target/product/${{ env.DEVICE_NAME }}/*vendor*.img
          name: ${{ env.DEVICE_NAME }}-${{ github.run_id }}
          tag_name: ${{ github.run_id }}
          body: |
            Manifest: ${{ env.MANIFEST_BRANCH }}
            Device: ${{ env.DEVICE_NAME }}
            Target: ${{ env.BUILD_TARGET }}.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
