name: Recovery Build (Legacy)

on:
  push:
    branches:
      - main

env:
  MANIFEST_URL: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni'
  MANIFEST_BRANCH: 'twrp-5.1'
  DEVICE_TREE_URL: 'https://github.com/coara-chocomaru/a03-br'
  DEVICE_TREE_BRANCH: 'main'
  DEVICE_PATH: 'device/sts/a03br'
  DEVICE_NAME: 'a03br'
  MAKEFILE_NAME: 'omni_a03br'
  BUILD_TARGET: 'recovery'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    container:
      image: ubuntu:14.04
    permissions:
      contents: write

    steps:
      - name: Display Run Parameters
        shell: bash
        run: |
          echo "::group::User Environment Variables"
          echo "Manifest URL: ${{ env.MANIFEST_URL }}"
          echo "Manifest Branch: ${{ env.MANIFEST_BRANCH }}"
          echo "Device Tree URL: ${{ env.DEVICE_TREE_URL }}"
          echo "Device Tree Branch: ${{ env.DEVICE_TREE_BRANCH }}"
          echo "Device Path: ${{ env.DEVICE_PATH }}"
          echo "Device Name: ${{ env.DEVICE_NAME }}"
          echo "Makefile Name: ${{ env.MAKEFILE_NAME }}"
          echo "Build Target: ${{ env.BUILD_TARGET }}.img"
          echo "::endgroup::"

      - name: Prepare the environment
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: UTC
        shell: bash
        run: |
          set -euxo pipefail

          rm -f /etc/apt/sources.list.d/*.list || true
          rm -f /etc/apt/sources.list.d/ubuntu-esm-infra-trusty.list || true

          cat >/etc/apt/sources.list <<'EOF'
          deb http://archive.ubuntu.com/ubuntu trusty main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu trusty-updates main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu trusty-backports main restricted universe multiverse
          deb http://security.ubuntu.com/ubuntu trusty-security main restricted universe multiverse
          EOF

          echo "tzdata tzdata/Areas select Etc" | debconf-set-selections
          echo "tzdata tzdata/Zones/Etc select UTC" | debconf-set-selections

          apt-get -o Acquire::Check-Valid-Until=false update

          apt-get install -y --no-install-recommends \
            gperf gcc-multilib g++-multilib \
            libc6-dev lib32ncurses5-dev x11proto-core-dev libx11-dev tree \
            lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc bc ccache \
            lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev \
            libsdl1.2-dev \
            libwxbase3.0-0 libwxbase3.0-dev \
            libwxgtk3.0-0 libwxgtk3.0-dev \
            wx3.0-headers wx-common zip \
            libxml2 lzop pngcrush schedtool squashfs-tools imagemagick \
            libbz2-dev lzma ncftp qemu-user-static libncurses5 \
            python git curl python2.7 debconf-utils openjdk-7-jdk \
            libbcprov-java \
            make m4 bison flex libssl-dev libtool autoconf automake gawk \
            ca-certificates

          update-alternatives --install /usr/bin/python python /usr/bin/python2.7 1 || true
          update-alternatives --install /usr/bin/python2 python2 /usr/bin/python2.7 1 || true
          echo "JAVA_HOME=/usr/lib/jvm/java-7-openjdk-amd64" >> "$GITHUB_ENV"
          echo "USE_CCACHE=1" >> "$GITHUB_ENV"
          echo "JAVA_TOOL_OPTIONS=-Xbootclasspath/a:/usr/share/java/bcprov.jar" >> "$GITHUB_ENV"

      - name: Clone repository
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --depth=1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .

      - name: Install repo
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ~/bin
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo-1 -o ~/bin/repo
          chmod a+x ~/bin/repo
          ln -sf ~/bin/repo /usr/bin/repo

      - name: Initialize repo
        shell: bash
        id: pwd
        run: |
          set -euxo pipefail
          mkdir -p workspace
          cd workspace
          echo "workspace-folder=$(pwd)" >> "$GITHUB_OUTPUT"
          git config --global user.name "azwhikaru"
          git config --global user.email "azwhikaru+37921907@github.com"
          repo init --depth=1 --repo-branch=repo-1 -u "${{ env.MANIFEST_URL }}" -b "${{ env.MANIFEST_BRANCH }}"

      - name: Repo Sync
        shell: bash
        working-directory: workspace
        run: |
          set -euxo pipefail
          repo sync -j"$(nproc --all)" --force-sync --no-clone-bundle --no-tags --prune

      - name: Move files to workspace
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "workspace/${{ env.DEVICE_PATH }}"
          find . -maxdepth 1 -mindepth 1 \
            ! -name workspace \
            ! -name .git \
            -exec mv -t "workspace/${{ env.DEVICE_PATH }}" -- {} +

      - name: Patch legacy nullptr build error
        shell: bash
        working-directory: ${{ steps.pwd.outputs.workspace-folder }}
        run: |
          set -euxo pipefail
          sed -i 's/nullptr/NULL/g' bootable/recovery/partition.cpp

      - name: Exclude sbin/healthd from recovery ramdisk before packing
        shell: bash
        working-directory: ${{ steps.pwd.outputs.workspace-folder }}
        run: |
          set -euxo pipefail
          awk '
          {
            if ($0 ~ /\$\(MKBOOTFS\) \$\(TARGET_RECOVERY_ROOT_OUT\)/ && !done) {
              match($0, /^[ \t]*/)
              indent = substr($0, RSTART, RLENGTH)
              print indent "$(hide) rm -f $(TARGET_RECOVERY_ROOT_OUT)/sbin/healthd"
              done = 1
            }
            print
          }
          END {
            if (!done) {
              print "ERROR: $(MKBOOTFS) $(TARGET_RECOVERY_ROOT_OUT) line not found in build/core/Makefile" > "/dev/stderr"
              exit 1
            }
          }
          ' build/core/Makefile > build/core/Makefile.new
          mv build/core/Makefile.new build/core/Makefile
          grep -n 'rm -f \$(TARGET_RECOVERY_ROOT_OUT)/sbin/healthd' build/core/Makefile

      - name: Building recovery
        shell: bash
        working-directory: ${{ steps.pwd.outputs.workspace-folder }}
        run: |
          set -euxo pipefail
          set +u
          source build/envsetup.sh
          lunch "${{ env.MAKEFILE_NAME }}-eng"
          set -u
          export ALLOW_MISSING_DEPENDENCIES=true
          make "${{ env.BUILD_TARGET }}image" -j2

      - name: Upload to Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python2 - <<'PY'
          from __future__ import print_function
          import glob
          import json
          import os
          import sys
          import urllib2
          import urllib
          from urlparse import urlparse, parse_qs

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          run_id = os.environ["GITHUB_RUN_ID"]
          device = os.environ["DEVICE_NAME"]
          target = os.environ["BUILD_TARGET"]
          body = "Manifest: {0}\nDevice: {1}\nTarget: {2}.img\n".format(
              os.environ["MANIFEST_BRANCH"], device, target
          )

          patterns = [
              "workspace/out/target/product/{0}/{1}.img".format(device, target),
              "workspace/out/target/product/{0}/*.zip".format(device),
              "workspace/out/target/product/{0}/*vendor*.img".format(device),
          ]
          assets = []
          for pattern in patterns:
              assets.extend(sorted(glob.glob(pattern)))
          # filter only files
          assets = [p for p in assets if os.path.isfile(p)]
          if not assets:
              sys.exit("No release assets found")

          headers = {
              "Authorization": "Bearer {0}".format(token),
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "python",
          }

          def request(url, method="GET", data=None, extra_headers=None):
              hdrs = dict(headers)
              if extra_headers:
                  hdrs.update(extra_headers)
              req = urllib2.Request(url, data=data, headers=hdrs)
              req.get_method = lambda: method
              return urllib2.urlopen(req)

          release_api = "https://api.github.com/repos/{0}/releases".format(repo)
          payload = json.dumps({
              "tag_name": run_id,
              "name": "{0}-{1}".format(device, run_id),
              "body": body,
              "draft": False,
              "prerelease": False,
          }).encode("utf-8")

          try:
              resp = request(release_api, method="POST", data=payload,
                             extra_headers={"Content-Type": "application/json"})
              release = json.loads(resp.read())
          except urllib2.HTTPError as e:
              if e.code == 422:
                  # release already exists, fetch it
                  resp = request("{0}/tags/{1}".format(release_api, run_id))
                  release = json.loads(resp.read())
              else:
                  raise

          upload_url = release["upload_url"].split("{", 1)[0]
          for asset in assets:
              name = os.path.basename(asset)
              url = "{0}?{1}".format(upload_url, urllib.urlencode({"name": name}))
              with open(asset, "rb") as f:
                  data = f.read()
              resp = request(url, method="POST", data=data, extra_headers={
                  "Content-Type": "application/octet-stream",
                  "Content-Length": str(len(data)),
              })
              print("uploaded {0}: {1}".format(name, resp.getcode()))
          print("release complete")
          PY
