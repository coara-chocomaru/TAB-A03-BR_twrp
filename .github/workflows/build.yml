name: Recovery Build (Ubuntu 14.04 / shell only)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  MANIFEST_URL: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni'
  MANIFEST_BRANCH: 'twrp-5.1'
  DEVICE_TREE_URL: 'https://github.com/coara-chocomaru/a03-br'
  DEVICE_TREE_BRANCH: 'main'
  DEVICE_PATH: 'device/sts/a03br'
  DEVICE_NAME: 'a03br'
  MAKEFILE_NAME: 'omni_a03br'
  BUILD_TARGET: 'recoveryimage'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    container:
      image: ubuntu:14.04
    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - name: Fix old Ubuntu mirrors
        run: |
          sed -i 's|http://archive.ubuntu.com/ubuntu|http://old-releases.ubuntu.com/ubuntu|g' /etc/apt/sources.list || true
          sed -i 's|http://security.ubuntu.com/ubuntu|http://old-releases.ubuntu.com/ubuntu|g' /etc/apt/sources.list || true
          apt-get update

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: UTC
        run: |
          apt-get install -y          python2.7   build-essential git-core gnupg flex bison gperf zip curl zlib1g-dev             gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev             x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev             libxml2-utils xsltproc unzip bc ccache liblz4-tool libncurses5-dev             libsdl1.2-dev libwxgtk2.8-dev libxml2 lzop pngcrush schedtool             squashfs-tools imagemagick libbz2-dev lzma ncftp python             openjdk-7-jdk libssl-dev libtool autoconf automake gawk
          ln -sf /usr/bin/python2.7 /usr/bin/python || true
          ln -sf /usr/bin/python2.7 /usr/bin/python2 || true
          echo "JAVA_HOME=/usr/lib/jvm/java-7-openjdk-amd64" >> "$GITHUB_ENV"
          echo "/usr/lib/jvm/java-7-openjdk-amd64/bin" >> "$GITHUB_PATH"

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl -L https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          ln -sf ~/bin/repo /usr/bin/repo

      - name: Initialize source tree
        run: |
          mkdir -p workspace
          cd workspace
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          repo init --depth=1 -u "${MANIFEST_URL}" -b "${MANIFEST_BRANCH}"

      - name: Sync repo
        run: |
          repo sync -j"$(nproc --all)" --force-sync
        working-directory: workspace

      - name: Clone device tree
        run: |
          mkdir -p "workspace/$(dirname "${DEVICE_PATH}")"
          git clone --depth=1 --branch "${{ github.ref_name }}"             "https://github.com/${{ github.repository }}.git"             "workspace/${DEVICE_PATH}"

      - name: Build recovery
        run: |
          source build/envsetup.sh
          lunch "${MAKEFILE_NAME}-eng"
          make "${BUILD_TARGET}" -j2
        working-directory: workspace

      - name: Show build outputs
        run: |
          ls -lah "out/target/product/${DEVICE_NAME}/" || true
        working-directory: workspace
